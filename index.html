<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensa Sleep · 오감 수면 프로토콜</title>
<style>
  /* ── 기본 리셋 및 색상 변수 ─────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #FAFAF8;
    --surface:  #F3F1EC;
    --border:   #E2DFD8;
    --text:     #1A1A18;
    --muted:    #6B6860;
    --hint:     #A09E98;
    --amber:    #BA7517;
    --amber-bg: #FAEEDA;
    --amber-lt: #FDF5E8;
    --teal:     #0F6E56;
    --teal-bg:  #E1F5EE;
    --purple:   #534AB7;
    --purple-bg:#EEEDFE;
    --coral:    #993C1D;
    --coral-bg: #FAECE7;
    --green:    #3B6D11;
    --green-bg: #EAF3DE;
  }

  body {
    font-family: -apple-system, "Apple SD Gothic Neo", "Pretendard", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.65;
    min-height: 100vh;
  }

  /* ── 레이아웃 ──────────────────────────────────────── */
  .wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: 40px 20px 100px; /* 하단 네비 바 높이(60px) + 여유 공간 확보 */
  }

  /* ── 타이포그래피 ──────────────────────────────────── */
  h1 { font-size: 22px; font-weight: 600; line-height: 1.35; margin-bottom: 10px; }
  h2 { font-size: 18px; font-weight: 600; line-height: 1.35; margin-bottom: 8px; }
  p  { font-size: 14px; color: var(--muted); line-height: 1.7; }

  /* ── 배지/태그 ─────────────────────────────────────── */
  .badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 3px 9px;
    border-radius: 20px;
    margin-bottom: 14px;
  }
  .badge-amber  { background: var(--amber-bg);  color: var(--amber); }
  .badge-teal   { background: var(--teal-bg);   color: var(--teal); }
  .badge-purple { background: var(--purple-bg); color: var(--purple); }

  /* ── 프로그레스 바 ─────────────────────────────────── */
  .progress-track {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 32px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--amber);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* ── 카드 ──────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 10px;
  }
  .card-white {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 8px;
  }

  /* ── 선택 카드 (클릭 가능) ─────────────────────────── */
  .choice {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    margin-bottom: 8px;
  }
  .choice:hover { border-color: var(--amber); }
  .choice.selected {
    background: var(--amber-lt);
    border-color: var(--amber);
  }
  .choice .choice-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 3px;
    color: var(--text);
  }
  .choice .choice-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }
  .choice.selected .choice-title { color: var(--amber); }

  /* ── 슬라이더 ──────────────────────────────────────── */
  .slider-row { margin-bottom: 14px; }
  .slider-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .slider-label { font-size: 14px; font-weight: 500; }
  .slider-val {
    font-size: 12px;
    background: var(--amber-bg);
    color: var(--amber);
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }
  input[type=range] {
    width: 100%;
    accent-color: var(--amber);
    height: 4px;
    cursor: pointer;
  }
  .slider-ends {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--hint);
    margin-top: 4px;
  }

  /* ── 버튼 ──────────────────────────────────────────── */
  .btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: var(--amber);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    margin-top: 16px;
    text-align: center;
  }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    margin-top: 8px;
  }
  .btn-ghost:hover { background: var(--surface); opacity: 1; }

  /* ── 타임라인 (프로토콜 뷰) ───────────────────────── */
  .timeline { position: relative; padding-left: 22px; }
  .timeline-phase { position: relative; margin-bottom: 28px; }
  /* 세로 연결선 */
  .timeline-phase::before {
    content: "";
    position: absolute;
    left: -14px;
    top: 10px;
    bottom: -28px;
    width: 1px;
    background: var(--border);
  }
  .timeline-phase:last-child::before { display: none; }
  /* 점 */
  .timeline-dot {
    position: absolute;
    left: -18px;
    top: 5px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--amber);
    border: 2px solid var(--bg);
  }
  .timeline-time {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    color: var(--amber);
    background: var(--amber-bg);
    padding: 2px 8px;
    border-radius: 10px;
    margin-bottom: 6px;
  }
  .timeline-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .action-item {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 5px;
    font-size: 13px;
    line-height: 1.55;
    color: var(--text);
  }
  .ref-tag {
    display: inline-block;
    font-size: 10px;
    background: var(--teal-bg);
    color: var(--teal);
    padding: 2px 6px;
    border-radius: 6px;
    margin-top: 4px;
    font-weight: 500;
  }

  /* ── 체크리스트 아이템 ─────────────────────────────── */
  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
    transition: color 0.15s;
  }
  .check-item:last-child { border-bottom: none; }
  .check-item.done { color: var(--hint); text-decoration: line-through; }
  .checkbox {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: transparent;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 11px;
    color: #fff;
    font-weight: 700;
  }
  .check-item.done .checkbox {
    background: var(--amber);
    border-color: var(--amber);
  }

  /* ── 진행률 링 ─────────────────────────────────────── */
  .progress-ring-wrap {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 20px;
  }
  .ring-text { font-size: 22px; font-weight: 700; color: var(--amber); }
  .ring-sub  { font-size: 12px; color: var(--muted); }

  /* ── 알림 박스 ─────────────────────────────────────── */
  .notice {
    background: var(--amber-lt);
    border: 1px solid #F0C060;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    color: var(--amber);
    line-height: 1.65;
    margin-top: 16px;
  }

  /* ── 감각 채널 요약 그리드 ─────────────────────────── */
  .sense-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 24px;
  }
  .sense-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
  }
  .sense-tag  { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
  .sense-desc { font-size: 11px; color: var(--muted); }

  /* ── 로딩 스피너 ───────────────────────────────────── */
  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--amber);
    border-radius: 50%;
    animation: spin 0.85s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 260px;
    gap: 16px;
    text-align: center;
  }

  /* ── 화면 전환 애니메이션 ─────────────────────────── */
  .screen { animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

  /* ── 구분선 ────────────────────────────────────────── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0;
  }

  /* ── 공통 하단 네비게이션 바 ───────────────────────── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: #fff;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: stretch;
    z-index: 50;
    /* iPhone 홈 인디케이터 영역 자동 대응 */
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .nav-tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: var(--hint);
    font-size: 11px;
    font-weight: 500;
    gap: 4px;
    transition: color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-tab:hover  { background: var(--surface); }
  /* 현재 파일에 해당하는 탭만 amber 색으로 활성화 */
  .nav-tab.active { color: var(--amber); }
  .tab-icon  { font-size: 18px; line-height: 1; }
  .tab-label { font-size: 11px; line-height: 1; }
</style>
</head>
<body>
<div class="wrap">
  <!-- 화면이 JS로 교체됩니다 -->
  <div id="app"></div>
</div>

<script>
// ────────────────────────────────────────────────────────────
// 데이터 정의
// ────────────────────────────────────────────────────────────

const PROBLEMS = [

const SENSES = [
  { id: "sound", label: "소음 수준",     left: "조용함",     right: "시끄러움" },
  { id: "light", label: "취침 전 조명",  left: "어두움",     right: "밝은 형광등" },

// 수면 문제 유형별 오감 프로토콜
// 각 phase: { time, title, actions: [{ text, ref }] }

        { text: "조명을 2,700K 이하 따뜻한 색온도로 전환 — 형광등은 끕니다", ref: "Gooley et al., JCEM 2011" },
        { text: "스마트폰·태블릿 오프 — 블루라이트 차단이 멜라토닌 분비를 지킵니다", ref: "Chang et al., PNAS 2015" },

        { text: "60–80BPM 진정 음악 재생 (클래식·재즈·보사노바)", ref: "Jespersen et al., Cochrane 2022" },

        { text: "완전 암흑 유지 — 3lux 미만이 이상적입니다", ref: "Cho et al., Chronobiol Int 2018" },

      ]
    },
  ],
  waking: [
    {
      time: "취침 90분 전", title: "각성 차단 환경 준비",
      actions: [
        { text: "조명을 1,900K 이하로 점진적으로 낮춥니다", ref: "Scientific Reports 2019" },
        { text: "침실을 18–20°C로 사전 냉각합니다", ref: "Harding et al., Front. Neurosci. 2019" },
        { text: "알림음·진동 모두 차단, 비행기 모드를 설정합니다", ref: null },
      ]
    },
    {
      time: "취침 시", title: "외부 자극 완전 차단",

        { text: "백색소음 또는 브라운소음으로 환경 소음을 마스킹합니다", ref: "Messineo et al., Front. Neurol. 2017" },

      actions: [
        { text: "스마트 조명으로 일출을 모사 — 점진적 밝기 상승 설정", ref: "Gooley et al., JCEM 2011" },
        { text: "알람 대신 부드러운 음악으로 기상합니다", ref: null },
        { text: "기상 30분 전 침실 온도를 1–2°C 상승 설정합니다", ref: "Harding et al., Front. Neurosci. 2019" },
      ]
    },
  ],
};

const PROBLEM_LABELS = {
  onset:  "잠들기 어려움",
  waking: "자주 깨어남",
  early:  "너무 일찍 기상",
  tired:  "자도 피곤함",
};

// ────────────────────────────────────────────────────────────
// 앱 상태
// ────────────────────────────────────────────────────────────

const state = {
  step:    0,          // 현재 화면 인덱스
  problem: null,       // 선택된 수면 문제 id
  scores:  { sound: 5, light: 7, temp: 5, touch: 3 },
  checks:  {},         // 체크리스트 완료 상태
};

// ────────────────────────────────────────────────────────────
// 렌더 헬퍼
// ────────────────────────────────────────────────────────────

// 화면 컨테이너를 교체하는 메인 렌더 함수
function render(html) {
  document.getElementById("app").innerHTML =
    `<div class="screen">${html}</div>`;
}

// 진행 바 HTML 생성 (pct: 0–100)
function progressBar(pct) {
  return `
    <div class="progress-track">
      <div class="progress-fill" style="width:${pct}%"></div>
    </div>`;
}

// 논문 참조 태그 HTML 생성
function refTag(ref) {
  return ref ? `<div class="ref-tag">📄 ${ref}</div>` : "";
}

// ────────────────────────────────────────────────────────────
// 각 화면 렌더링
// ────────────────────────────────────────────────────────────

// ── 화면 0: 랜딩 ────────────────────────────────────────────
function renderLanding() {
  render(`
    <span class="badge badge-amber">Sensa Sleep · 오감 수면 최적화</span>
    <h1>오늘 밤 수면을<br>오감으로 설계합니다</h1>
    <p style="margin-bottom:24px">3분 진단으로 수면 문제 유형에 맞는
      청각·시각·후각·온열 프로토콜을 받으세요.<br>
      모든 처방은 PubMed·Cochrane·PNAS 게재 연구를 근거로 합니다.</p>

    <div class="sense-grid">
      <div class="sense-card">
        <div class="sense-tag" style="color:var(--teal)">🎧 청각</div>
        <div class="sense-desc">뇌파 동기화 · 소음 마스킹</div>
      </div>
      <div class="sense-card">
        <div class="sense-tag" style="color:var(--amber)">💡 시각</div>
        <div class="sense-desc">멜라토닌 조절 · 암흑 유지</div>
      </div>
      <div class="sense-card">
        <div class="sense-tag" style="color:var(--purple)">🌿 후각</div>
        <div class="sense-desc">GABA 경로 이완 · 아로마</div>
      </div>
      <div class="sense-card">
        <div class="sense-tag" style="color:var(--coral)">🌡 온열·촉각</div>
        <div class="sense-desc">체온 하강 가속 · 압력 자극</div>
      </div>
    </div>

    <button class="btn" onclick="goStep(1)">수면 진단 시작하기 →</button>
  `);
}

// ── 화면 1: 수면 문제 선택 ──────────────────────────────────
function renderStep1() {
  const choices = PROBLEMS.map(p => `
    <div class="choice ${state.problem === p.id ? "selected" : ""}"
         onclick="selectProblem('${p.id}')">
      <div class="choice-title">${p.title}</div>
      <div class="choice-desc">${p.desc}</div>
    </div>
  `).join("");

  render(`
    ${progressBar(25)}
    <span class="badge badge-amber">Step 1 · 수면 문제 진단</span>
    <h2>어떤 수면 문제가 있나요?</h2>
    <p style="margin-bottom:16px">가장 자주 경험하는 증상을 선택해 주세요.</p>
    ${choices}
    <button class="btn" onclick="goStep(2)"
      ${state.problem ? "" : "disabled"}>다음 단계 →</button>
    <button class="btn btn-ghost" onclick="goStep(0)">← 처음으로</button>
  `);
}

// ── 화면 2: 환경 점수 입력 ──────────────────────────────────
function renderStep2() {
  const sliders = SENSES.map(s => `
    <div class="card slider-row">
      <div class="slider-header">
        <span class="slider-label">${s.label}</span>
        <span class="slider-val" id="val-${s.id}">${state.scores[s.id]} / 10</span>
      </div>
      <input type="range" min="1" max="10" step="1"
             value="${state.scores[s.id]}"
             oninput="updateScore('${s.id}', this.value)">
      <div class="slider-ends">
        <span>${s.left}</span>
        <span>${s.right}</span>
      </div>
    </div>
  `).join("");

  render(`
    ${progressBar(50)}
    <span class="badge badge-amber">Step 2 · 환경 점수 입력</span>
    <h2>현재 수면 환경을 평가해 주세요</h2>
    <p style="margin-bottom:16px">슬라이더를 조정해 현재 상태를 알려주세요.</p>
    ${sliders}
    <button class="btn" onclick="generateProtocol()">맞춤 프로토콜 생성 →</button>
    <button class="btn btn-ghost" onclick="goStep(1)">← 이전으로</button>
  `);
}

// ── 화면 2.5: 로딩 ─────────────────────────────────────────
function renderLoading() {
  render(`
    <div class="loading-wrap">
      <div class="spinner"></div>
      <div>
        <p style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px">
          프로토콜 생성 중</p>
        <p>연구 데이터와 환경 점수를 분석하고 있습니다</p>
      </div>
    </div>
  `);
}

// ── 화면 3: 맞춤 프로토콜 ──────────────────────────────────
function renderProtocol() {
  const protocol = PROTOCOLS[state.problem];
  const phases = protocol.map(phase => `
    <div class="timeline-phase">
      <div class="timeline-dot"></div>
      <div class="timeline-time">${phase.time}</div>
      <div class="timeline-title">${phase.title}</div>
      ${phase.actions.map(a => `
        <div class="action-item">
          ${a.text}
          ${refTag(a.ref)}
        </div>
      `).join("")}
    </div>
  `).join("");

  render(`
    ${progressBar(75)}
    <span class="badge badge-amber">오늘 밤 맞춤 프로토콜</span>
    <h2>${PROBLEM_LABELS[state.problem]}에 맞게 설계된 프로토콜</h2>
    <p style="margin-bottom:20px">4개 감각 채널을 단계적으로 조율해
      수면으로 안내합니다.</p>

    <div class="timeline">${phases}</div>

    <button class="btn" onclick="goStep(4)">체크리스트로 이동 →</button>
    <button class="btn btn-ghost" onclick="goStep(2)">← 환경 재설정</button>
  `);
}

// ── 화면 4: 체크리스트 ─────────────────────────────────────
function renderChecklist() {
  const protocol = PROTOCOLS[state.problem];

  // 전체 항목 수 및 완료 수 계산
  let total = 0;
  let done  = 0;
  protocol.forEach((phase, pi) => {
    phase.actions.forEach((_, ai) => {
      total++;
      if (state.checks[`${pi}-${ai}`]) done++;
    });
  });
  const pct = total ? Math.round(done / total * 100) : 0;

  // 체크리스트 HTML
  const sections = protocol.map((phase, pi) => {
    const items = phase.actions.map((a, ai) => {
      const key     = `${pi}-${ai}`;
      const checked = state.checks[key];
      return `
        <div class="check-item ${checked ? "done" : ""}"
             onclick="toggleCheck('${key}')">
          <div class="checkbox">${checked ? "✓" : ""}</div>
          <div>${a.text}</div>
        </div>
      `;
    }).join("");

    return `
      <div class="card-white">
        <div style="font-size:11px;font-weight:600;color:var(--amber);
                    text-transform:uppercase;letter-spacing:0.05em;
                    margin-bottom:8px">${phase.time}</div>
        ${items}
      </div>
    `;
  }).join("");

  render(`
    ${progressBar(100)}
    <span class="badge badge-amber">오늘 밤 체크리스트</span>
    <h2>실천 항목을 체크하며 수면에 드세요</h2>

    <!-- 진행률 표시 -->
    <div class="progress-ring-wrap">
      <div>
        <div class="ring-text">${pct}%</div>
        <div class="ring-sub">완료 ${done} / 전체 ${total}</div>
      </div>
      <div style="flex:1">
        <div class="progress-track" style="margin:0">
          <div class="progress-fill" style="width:${pct}%"></div>
        </div>
        <div style="font-size:12px;color:var(--hint);margin-top:6px">
          ${pct === 100 ? "오늘 밤 프로토콜 완료 · 수고했습니다 🌙" : "항목을 탭하면 완료 처리됩니다"}
        </div>
      </div>
    </div>

    ${sections}

    <div class="notice">
      일관성이 핵심입니다. 오늘 밤부터 최소 21일 이상 적용할 때
      수면 구조 변화가 측정됩니다. (Jespersen et al., 2022)
    </div>

    <button class="btn" style="margin-top:20px" onclick="resetAll()">
      처음으로 돌아가기
    </button>
  `);
}

// ────────────────────────────────────────────────────────────
// 이벤트 핸들러
// ────────────────────────────────────────────────────────────

// 화면 전환 — 각 step 번호에 맞는 렌더 함수를 호출
function goStep(n) {
  state.step = n;
  switch (n) {
    case 0: renderLanding();  break;
    case 1: renderStep1();    break;
    case 2: renderStep2();    break;
    case 3: renderProtocol(); break;
    case 4: renderChecklist(); break;
  }
  // 화면 전환 시 상단으로 스크롤
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// 수면 문제 선택
function selectProblem(id) {
  state.problem = id;
  renderStep1(); // 선택 상태 반영하여 재렌더
}

// 슬라이더 값 업데이트 — DOM만 직접 수정해 리렌더 없이 처리
function updateScore(id, val) {
  state.scores[id] = parseInt(val);
  const el = document.getElementById(`val-${id}`);
  if (el) el.textContent = `${val} / 10`;
}

// 프로토콜 생성 — 짧은 로딩 후 화면 전환
function generateProtocol() {
  renderLoading();
  setTimeout(() => goStep(3), 1400);
}

// 체크 토글
function toggleCheck(key) {
  state.checks[key] = !state.checks[key];
  renderChecklist(); // 진행률 포함 재렌더
}

// 전체 초기화
function resetAll() {
  state.step    = 0;
  state.problem = null;
  state.checks  = {};
  goStep(0);
}

// ────────────────────────────────────────────────────────────
// 초기 실행
// ────────────────────────────────────────────────────────────
renderLanding();
</script>

<!-- ── 공통 하단 네비게이션 바 ─────────────────────────────── -->
<!-- 세 파일 모두 동일한 HTML. 활성 탭은 아래 스크립트가 자동으로 감지합니다. -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-tab" data-page="index.html">
    <span class="tab-icon">🔍</span>
    <span class="tab-label">진단</span>
  </a>
  <a href="sound-player.html" class="nav-tab" data-page="sound-player.html">
    <span class="tab-icon">🎧</span>
    <span class="tab-label">소리</span>
  </a>
  <a href="tracker.html" class="nav-tab" data-page="tracker.html">
    <span class="tab-icon">📋</span>
    <span class="tab-label">21일</span>
  </a>
</nav>

<script>
// 현재 파일명을 감지해 해당 탭에 .active 클래스를 부여합니다.
// pathname 끝이 '/' 혹은 비어 있으면 index.html로 간주합니다.
(function () {
  const page = location.pathname.split("/").pop() || "index.html";
  document.querySelectorAll(".nav-tab").forEach(function (tab) {
    if (tab.dataset.page === page) tab.classList.add("active");
  });
})();
</script>
</body>
</html>
